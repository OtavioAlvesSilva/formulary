<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="Assets/css/style.css">
    <title>Formulário</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="envelope_imagem">
                <div class="circulo_imagem_envelope">
                <img src="Assets/images/image.png"/>
                </div>
            </div>
            <div class="tittle">
                <h1>Entre em contato</h1>
            </div>
            <div class="subtittle">
                <p>Preencha o formulário abaixo e entraremos em contato o mais breve possível.</p>
            </div>
            <div class="formulario">
                <form>
                    <div class="campo">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" placeholder="Digite seu nome completo" required autocomplete="name"/>
                    </div>
                    <div class="campo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Digite seu melhor email" required autocomplete="email"/>
                    </div>
                    <div class="campo">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999" maxlength="11" required autocomplete="tel"/>
                    </div>
                    <div class="campo">
                        <label for="assunto">Assunto</label>
                        <select id="assunto" name="assunto" required>
                            <option value="">Selecione um assunto:</option>
                            <option value="duvida">Dúvida</option>
                            <option value="sugestao">Sugestão</option>
                            <option value="insatisfação">Insatisfação</option>
                            <option value="elogio">Elogio</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label name="prioridade">Prioridade</label>
                        <div class="opcoes_radio_body">
                            <div class="opcoes_radio" aria-required="true">
                                <input type="radio" id="baixa" name="prioridade" value="baixa">
                                <label for="baixa">Baixa</label>
                            </div>
                            <div class="opcoes_radio" aria-required="true">
                                <input type="radio" id="media" name="prioridade" value="media">
                                <label for="media">Média</label>
                            </div>
                            <div class="opcoes_radio" aria-required="true">
                                <input type="radio" id="alta" name="prioridade" value="alta">
                                <label for="alta">Alta</label>
                            </div>
                        </div>
                    </div>
                    <div class="campo">
                    <label name="areadetexto">Mensagem</label>
                    <textarea placeholder="Escreva sua mensagem aqui..." maxlength="200"></textarea>
                    </div>
                    <div class="campo checkbox">
                        <input type="checkbox" id="resposta" name="resposta" value="sim"/> 
                        <label for="resposta" class="termos_email" aria-required="true">Eu concordo em receber respostas por e-mail.</label>
                    </div>
                    <div class="campo">
                        <button type="submit" class="button_envio">Enviar mensagem</button>
                    </div>
                </form>
            </div>
            <div class="desenvolvedor">
                    <p>Desenvolvido por <a href="https://github.com/OtavioAlvesSilva">Otavio Alves</a> © 2026</p>
            </div>
        </div>
    </main>
</body>
</html>
